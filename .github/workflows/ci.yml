name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Verify static app and tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run verification suite
        run: npm run verify
